const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* Almacenamiento real del navegador (localStorage), con la misma forma
   de la API que usaba antes, para no tocar el resto del codigo. */
const LS = {
  async get(key) {
    const v = window.localStorage.getItem(key);
    if (v === null) throw new Error("sin dato guardado");
    return { key, value: v };
  },
  async set(key, value) {
    window.localStorage.setItem(key, value);
    return { key, value };
  },
};


/* ------------------------------------------------------------------ */
/* Constantes                                                          */
/* ------------------------------------------------------------------ */

const MEMBERS = [
  { id: "jaime", name: "Jaime", tint: "#F4B942" },
  { id: "ale", name: "Ale", tint: "#5BC98C" },
  { id: "pato", name: "Pato", tint: "#6FB3E8" },
  { id: "gonzalo", name: "Gonzalo", tint: "#E8634A" },
  { id: "jorge", name: "Jorge", tint: "#C08CE8" },
  { id: "juane", name: "Juane", tint: "#E88CB8" },
  { id: "mojo", name: "Mojo", tint: "#7FD8D0" },
];

const CUR = {
  CLP: { sym: "$", dec: 0 },
  ARS: { sym: "AR$", dec: 0 },
  USD: { sym: "US$", dec: 2 },
};
const CUR_LIST = ["CLP", "ARS", "USD"];

const DEFAULT_DATA = {
  base: "CLP",
  rates: { CLP: 1, ARS: 0.75, USD: 950 },
  ratesUpdatedAt: 0,
  expenses: [],
};

const KEY = "viaje-gastos-v1";
const ME_KEY = "viaje-gastos-me";

/* ------------------------------------------------------------------ */
/* Utilidades                                                          */
/* ------------------------------------------------------------------ */

const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

const nameOf = (id) => (MEMBERS.find((m) => m.id === id) || { name: id }).name;
const tintOf = (id) => (MEMBERS.find((m) => m.id === id) || { tint: "#8A9A93" }).tint;

function fmt(n, cur) {
  const c = CUR[cur] || CUR.CLP;
  const v = Number.isFinite(n) ? n : 0;
  return (
    c.sym +
    " " +
    new Intl.NumberFormat("es-CL", {
      minimumFractionDigits: c.dec,
      maximumFractionDigits: c.dec,
    }).format(v)
  );
}

function todayISO() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
}

function prettyDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const dias = ["dom", "lun", "mar", "mié", "jue", "vie", "sáb"];
  const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  return `${dias[dt.getDay()]} ${d} ${meses[m - 1]}`;
}

/** Reparte un monto en partes iguales respetando los decimales de la moneda. */
function splitEqual(amount, ids, cur) {
  const dec = (CUR[cur] || CUR.CLP).dec;
  const f = Math.pow(10, dec);
  const total = Math.round((amount || 0) * f);
  const n = ids.length || 1;
  const base = Math.floor(total / n);
  let rem = total - base * n;
  const out = {};
  ids.forEach((id, i) => {
    out[id] = (base + (i < rem ? 1 : 0)) / f;
  });
  return out;
}

function sharesOf(exp) {
  if (exp.mode === "equal") {
    const ps = exp.participants && exp.participants.length ? exp.participants : MEMBERS.map((m) => m.id);
    return splitEqual(exp.amount, ps, exp.currency);
  }
  return exp.shares || {};
}

function makeConvert(data) {
  const r = data.rates || DEFAULT_DATA.rates;
  const b = r[data.base] || 1;
  return (amount, cur) => ((amount || 0) * (r[cur] || 1)) / b;
}

function computeBalances(data) {
  const conv = makeConvert(data);
  const paid = {};
  const owed = {};
  MEMBERS.forEach((m) => {
    paid[m.id] = 0;
    owed[m.id] = 0;
  });
  (data.expenses || []).forEach((e) => {
    if (e.deleted) return;
    if (paid[e.payer] !== undefined) paid[e.payer] += conv(e.amount, e.currency);
    const sh = sharesOf(e);
    Object.entries(sh).forEach(([id, amt]) => {
      if (owed[id] !== undefined) owed[id] += conv(amt, e.currency);
    });
  });
  return MEMBERS.map((m) => ({
    id: m.id,
    paid: paid[m.id],
    owed: owed[m.id],
    net: paid[m.id] - owed[m.id],
  }));
}

/** Liquidación con el mínimo de transferencias posible (greedy). */
function settle(balances, cur) {
  const dec = (CUR[cur] || CUR.CLP).dec;
  const f = Math.pow(10, dec);
  const cred = [];
  const deb = [];
  balances.forEach((b) => {
    const v = Math.round(b.net * f);
    if (v > 0) cred.push({ id: b.id, v });
    else if (v < 0) deb.push({ id: b.id, v: -v });
  });
  cred.sort((a, b) => b.v - a.v);
  deb.sort((a, b) => b.v - a.v);
  const out = [];
  let i = 0;
  let j = 0;
  while (i < deb.length && j < cred.length) {
    const amt = Math.min(deb[i].v, cred[j].v);
    if (amt > 0) out.push({ from: deb[i].id, to: cred[j].id, amount: amt / f });
    deb[i].v -= amt;
    cred[j].v -= amt;
    if (deb[i].v === 0) i++;
    if (cred[j].v === 0) j++;
  }
  return out;
}

/* ------------------------------------------------------------------ */
/* Almacenamiento compartido                                           */
/* ------------------------------------------------------------------ */

async function readShared() {
  if (typeof window === "undefined" || !LS) return null;
  try {
    const r = await LS.get(KEY, false);
    return r && r.value ? JSON.parse(r.value) : null;
  } catch {
    return null;
  }
}

async function writeShared(data) {
  if (typeof window === "undefined" || !LS) return false;
  const payload = JSON.stringify(data);
  for (let intento = 0; intento < 4; intento++) {
    try {
      await LS.set(KEY, payload, false);
      return true;
    } catch (e) {
      if (intento === 3) return false;
      await new Promise((r) => setTimeout(r, 600 * Math.pow(2, intento)));
    }
  }
  return false;
}

/** Verifica de verdad que se pueda escribir Y leer de vuelta. */
async function probeStorage() {
  if (typeof window === "undefined" || !LS) {
    return { ok: false, reason: "Esta ventana no tiene almacenamiento de artefactos disponible." };
  }
  try {
    const stamp = String(Date.now());
    await LS.set("viaje-probe", stamp, false);
    const r = await LS.get("viaje-probe", false);
    if (!r || r.value !== stamp) {
      return { ok: false, reason: "Se escribió el dato pero no se pudo leer de vuelta." };
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, reason: (e && e.message) || "Error desconocido al guardar." };
  }
}

function mergeData(remote, local) {
  if (!remote) return local;
  const map = new Map();
  (remote.expenses || []).forEach((e) => map.set(e.id, e));
  (local.expenses || []).forEach((e) => {
    const prev = map.get(e.id);
    if (!prev || (e.updatedAt || 0) >= (prev.updatedAt || 0)) map.set(e.id, e);
  });
  const localNewer = (local.ratesUpdatedAt || 0) >= (remote.ratesUpdatedAt || 0);
  return {
    base: localNewer ? local.base : remote.base,
    rates: localNewer ? local.rates : remote.rates,
    ratesUpdatedAt: Math.max(local.ratesUpdatedAt || 0, remote.ratesUpdatedAt || 0),
    expenses: Array.from(map.values()).sort((a, b) =>
      a.date === b.date ? (b.updatedAt || 0) - (a.updatedAt || 0) : b.date.localeCompare(a.date)
    ),
  };
}

/* ------------------------------------------------------------------ */
/* Lectura de boleta con IA                                            */
/* ------------------------------------------------------------------ */

async function shrinkImage(file, maxDim = 1600) {
  let src;
  try {
    src = await createImageBitmap(file, { imageOrientation: "from-image" });
  } catch {
    const dataUrl = await new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.onerror = () => rej(new Error("No se pudo leer la imagen"));
      r.readAsDataURL(file);
    });
    src = await new Promise((res, rej) => {
      const i = new Image();
      i.onload = () => res(i);
      i.onerror = () => rej(new Error("Imagen inválida"));
      i.src = dataUrl;
    });
  }
  const scale = Math.min(1, maxDim / Math.max(src.width, src.height));
  const c = document.createElement("canvas");
  c.width = Math.round(src.width * scale);
  c.height = Math.round(src.height * scale);
  c.getContext("2d").drawImage(src, 0, 0, c.width, c.height);
  const out = c.toDataURL("image/jpeg", 0.85);
  return { base64: out.split(",")[1], preview: out };
}

const SCAN_PROMPT = `Eres un lector de boletas y cuentas de restaurante. Devuelve SOLO un objeto JSON válido, sin markdown, sin explicaciones.

Formato exacto:
{"comercio":"","fecha":"YYYY-MM-DD","moneda":"CLP|ARS|USD","items":[{"nombre":"","monto":0}],"propina":0,"impuesto":0,"total":0}

Reglas:
- Un item por línea de consumo. Si una línea trae cantidad (ej: 2 cervezas), usa el monto total de esa línea y deja la cantidad en el nombre.
- "propina" es propina o servicio. "impuesto" es IVA u otros cargos separados. Si no aparecen, usa 0.
- No incluyas propina ni impuesto dentro de items.
- Moneda: infiere por símbolos, montos y contexto. Si no puedes, usa "CLP".
- Si la fecha no aparece, usa "".
- Todos los montos como números, sin separadores de miles ni símbolos.`;

async function scanReceipt(base64) {
  const res = await fetch("/api/scan", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: base64 }),
  });
  if (!res.ok) {
    const msg = await res.text();
    throw new Error(msg || "El servidor rechazo la imagen");
  }
  const data = await res.json();
  const text = (data.content || [])
    .filter((b) => b.type === "text")
    .map((b) => b.text)
    .join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const start = clean.indexOf("{");
  const end = clean.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("Respuesta ilegible");
  return JSON.parse(clean.slice(start, end + 1));
}

/* ------------------------------------------------------------------ */
/* Piezas de UI                                                        */
/* ------------------------------------------------------------------ */

function Avatar({ id, size = 34, dim = false }) {
  const n = nameOf(id);
  return (
    <span
      className="avatar"
      style={{
        width: size,
        height: size,
        background: dim ? "transparent" : tintOf(id),
        color: dim ? "var(--muted)" : "#0E1512",
        border: dim ? "1px solid var(--line)" : "none",
        fontSize: size * 0.42,
      }}
    >
      {n.slice(0, 2).toUpperCase()}
    </span>
  );
}

function Leader({ left, right, strong }) {
  return (
    <div className={"leader" + (strong ? " strong" : "")}>
      <span className="leader-l">{left}</span>
      <span className="leader-dots" />
      <span className="leader-r">{right}</span>
    </div>
  );
}

function Sheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="sheet-wrap" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheet-head">
          <span className="sheet-title">{title}</span>
          <button className="icon-btn" onClick={onClose} aria-label="Cerrar">
            ✕
          </button>
        </div>
        <div className="sheet-body">{children}</div>
      </div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* App                                                                 */
/* ------------------------------------------------------------------ */

function App() {
  const [data, setData] = useState(DEFAULT_DATA);
  const [me, setMe] = useState(null);
  const [tab, setTab] = useState("gastos");
  const [ready, setReady] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast] = useState(null);
  const [editing, setEditing] = useState(null);
  const [store, setStore] = useState({ ok: true, reason: null, checked: false });
  const dataRef = useRef(data);
  dataRef.current = data;

  const cur = data.base;
  const conv = useMemo(() => makeConvert(data), [data]);
  const balances = useMemo(() => computeBalances(data), [data]);
  const transfers = useMemo(() => settle(balances, cur), [balances, cur]);
  const live = useMemo(() => (data.expenses || []).filter((e) => !e.deleted), [data.expenses]);
  const total = useMemo(() => live.reduce((s, e) => s + conv(e.amount, e.currency), 0), [live, conv]);

  const say = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  }, []);

  /* carga inicial */
  useEffect(() => {
    (async () => {
      const p = await probeStorage();
      setStore({ ok: p.ok, reason: p.reason || null, checked: true });
      const remote = await readShared();
      if (remote) setData({ ...DEFAULT_DATA, ...remote });
      try {
        if (LS) {
          const r = await LS.get(ME_KEY, false);
          if (r && r.value) setMe(r.value);
        }
      } catch {
        /* aún no elige nombre */
      }
      setReady(true);
    })();
  }, []);

  /* sincronización periódica */
  const pull = useCallback(async () => {
    const remote = await readShared();
    if (remote) setData((d) => mergeData(remote, d));
  }, []);

  useEffect(() => {
    const t = setInterval(pull, 20000);
    const onFocus = () => pull();
    window.addEventListener("focus", onFocus);
    return () => {
      clearInterval(t);
      window.removeEventListener("focus", onFocus);
    };
  }, [pull]);

  const persist = useCallback(
    async (next) => {
      setData(next);
      setSyncing(true);
      const remote = await readShared();
      const merged = mergeData(remote, next);
      const ok = await writeShared(merged);
      setData(merged);
      setSyncing(false);
      if (!ok) {
        setStore({ ok: false, reason: "El último intento de guardar falló.", checked: true });
      } else if (!store.ok) {
        setStore({ ok: true, reason: null, checked: true });
      }
    },
    [store.ok]
  );

  const saveExpense = useCallback(
    (exp) => {
      const now = Date.now();
      const list = dataRef.current.expenses || [];
      const idx = list.findIndex((e) => e.id === exp.id);
      const next = { ...exp, updatedAt: now };
      const expenses = idx >= 0 ? list.map((e) => (e.id === exp.id ? next : e)) : [next, ...list];
      persist({ ...dataRef.current, expenses });
      setEditing(null);
      say(idx >= 0 ? "Gasto actualizado" : "Gasto agregado");
    },
    [persist, say]
  );

  const removeExpense = useCallback(
    (id) => {
      const expenses = (dataRef.current.expenses || []).map((e) =>
        e.id === id ? { ...e, deleted: true, updatedAt: Date.now() } : e
      );
      persist({ ...dataRef.current, expenses });
      setEditing(null);
      say("Gasto eliminado");
    },
    [persist, say]
  );

  const chooseMe = async (id) => {
    setMe(id);
    try {
      if (LS) await LS.set(ME_KEY, id, false);
    } catch {
      /* no crítico */
    }
  };

  if (!ready) {
    return (
      <div className="app center">
        <Style />
        <div className="muted mono">cargando…</div>
      </div>
    );
  }

  if (!me) {
    return (
      <div className="app">
        <Style />
        <div className="onboard">
          <div className="eyebrow">La cuenta del viaje</div>
          <h1 className="display">¿Quién eres?</h1>
          <p className="muted small">
            Se usa para marcar tus gastos y tus saldos. Ábrela siempre desde Chrome, no desde la app de Claude.
          </p>
          <div className="grid-people">
            {MEMBERS.map((m) => (
              <button key={m.id} className="person-pick" onClick={() => chooseMe(m.id)}>
                <Avatar id={m.id} size={40} />
                <span>{m.name}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <Style />

      <header className="topbar">
        <div>
          <div className="eyebrow">Gasto total del viaje</div>
          <div className="total mono">{fmt(total, cur)}</div>
          <div className="muted small">
            {live.length} gasto{live.length === 1 ? "" : "s"} · {fmt(total / MEMBERS.length, cur)} por persona
          </div>
        </div>
        <button className="icon-btn" onClick={pull} aria-label="Actualizar">
          <span className={syncing ? "spin" : ""}>↻</span>
        </button>
      </header>

      {store.checked && !store.ok && (
        <div className="alarm">
          <b>Los datos no se están guardando.</b> {store.reason} Todo lo que cargues se pierde al cerrar. Anda a
          Ajustes → Respaldo y copia el texto antes de salir.
        </div>
      )}

      <main className="main">
        {tab === "gastos" && (
          <ExpensesView
            data={data}
            live={live}
            cur={cur}
            conv={conv}
            me={me}
            onEdit={(e) => setEditing(e)}
          />
        )}
        {tab === "personas" && <PeopleView balances={balances} cur={cur} me={me} />}
        {tab === "saldar" && (
          <SettleView transfers={transfers} balances={balances} cur={cur} data={data} say={say} />
        )}
        {tab === "ajustes" && (
          <SettingsView data={data} persist={persist} me={me} setMe={chooseMe} say={say} store={store} />
        )}
      </main>

      <button className="fab" onClick={() => setEditing({ new: true })} aria-label="Agregar gasto">
        +
      </button>

      <nav className="tabs">
        {[
          ["gastos", "Gastos"],
          ["personas", "Personas"],
          ["saldar", "Saldar"],
          ["ajustes", "Ajustes"],
        ].map(([k, label]) => (
          <button key={k} className={"tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}>
            {label}
          </button>
        ))}
      </nav>

      {editing && (
        <ExpenseEditor
          initial={editing.new ? null : editing}
          me={me}
          defaultCurrency={cur}
          onSave={saveExpense}
          onDelete={removeExpense}
          onClose={() => setEditing(null)}
          say={say}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Vista: gastos                                                       */
/* ------------------------------------------------------------------ */

function ExpensesView({ live, cur, conv, me, onEdit }) {
  const groups = useMemo(() => {
    const g = {};
    live
      .slice()
      .sort((a, b) => (a.date === b.date ? (b.updatedAt || 0) - (a.updatedAt || 0) : b.date.localeCompare(a.date)))
      .forEach((e) => {
        (g[e.date] = g[e.date] || []).push(e);
      });
    return Object.entries(g);
  }, [live]);

  if (!live.length) {
    return (
      <div className="empty">
        <div className="empty-mark">✳</div>
        <h2 className="display sm">Todavía no hay gastos</h2>
        <p className="muted small">
          Toca el + para anotar el primero. Puedes escanear la boleta y repartir plato por plato.
        </p>
      </div>
    );
  }

  return (
    <div className="list">
      {groups.map(([date, items]) => (
        <section key={date} className="day">
          <div className="day-head">
            <span className="mono">{prettyDate(date)}</span>
            <span className="mono muted">
              {fmt(
                items.reduce((s, e) => s + conv(e.amount, e.currency), 0),
                cur
              )}
            </span>
          </div>
          {items.map((e) => {
            const sh = sharesOf(e);
            const mine = sh[me] || 0;
            return (
              <button key={e.id} className="row" onClick={() => onEdit(e)}>
                <Avatar id={e.payer} size={38} />
                <div className="row-mid">
                  <div className="row-title">{e.desc || "Sin nombre"}</div>
                  <div className="muted small">
                    {nameOf(e.payer)} pagó ·{" "}
                    {e.mode === "equal" ? "partes iguales" : e.mode === "items" ? "por consumo" : "montos fijos"}
                    {mine > 0 ? ` · tu parte ${fmt(mine, e.currency)}` : " · no participas"}
                  </div>
                </div>
                <div className="row-amt">
                  <span className="mono">{fmt(e.amount, e.currency)}</span>
                  {e.currency !== cur && (
                    <span className="muted mono tiny">{fmt(conv(e.amount, e.currency), cur)}</span>
                  )}
                </div>
              </button>
            );
          })}
        </section>
      ))}
      <div className="pad" />
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Vista: personas                                                     */
/* ------------------------------------------------------------------ */

function PeopleView({ balances, cur, me }) {
  const max = Math.max(1, ...balances.map((b) => Math.max(b.paid, b.owed)));
  return (
    <div className="list">
      <div className="section-label">Pagado y consumido por persona</div>
      {balances.map((b) => (
        <div key={b.id} className={"card" + (b.id === me ? " mine" : "")}>
          <div className="card-head">
            <Avatar id={b.id} size={32} />
            <span className="card-name">{nameOf(b.id)}</span>
            <span
              className="mono net"
              style={{ color: b.net >= 0 ? "var(--credit)" : "var(--debt)" }}
            >
              {b.net >= 0 ? "+" : "−"}
              {fmt(Math.abs(b.net), cur).replace(/^[^\s]+\s/, "")}
            </span>
          </div>
          <div className="bars">
            <div className="bar-row">
              <span className="bar-label">pagó</span>
              <div className="bar-track">
                <div className="bar-fill paid" style={{ width: `${(b.paid / max) * 100}%` }} />
              </div>
              <span className="mono tiny">{fmt(b.paid, cur)}</span>
            </div>
            <div className="bar-row">
              <span className="bar-label">gastó</span>
              <div className="bar-track">
                <div className="bar-fill owed" style={{ width: `${(b.owed / max) * 100}%` }} />
              </div>
              <span className="mono tiny">{fmt(b.owed, cur)}</span>
            </div>
          </div>
        </div>
      ))}
      <p className="muted small foot">
        El neto en verde es plata que le deben. En rojo, plata que debe poner.
      </p>
      <div className="pad" />
    </div>
  );
}

/* Vista: saldar                                                       */
/* ------------------------------------------------------------------ */

function SettleView({ transfers, balances, cur, data, say }) {
  const copy = async () => {
    const lines = [
      "Cierre de cuentas del viaje",
      "",
      ...balances.map(
        (b) =>
          `${nameOf(b.id)}: pagó ${fmt(b.paid, cur)} · gastó ${fmt(b.owed, cur)} · ${
            b.net >= 0 ? "a favor" : "debe"
          } ${fmt(Math.abs(b.net), cur)}`
      ),
      "",
      "Transferencias:",
      ...transfers.map((t) => `${nameOf(t.from)} → ${nameOf(t.to)}: ${fmt(t.amount, cur)}`),
      "",
      `Tipos de cambio usados: 1 USD = ${data.rates.USD} CLP · 1 ARS = ${data.rates.ARS} CLP`,
    ];
    try {
      await navigator.clipboard.writeText(lines.join("\n"));
      say("Resumen copiado");
    } catch {
      say("No se pudo copiar en este navegador");
    }
  };

  return (
    <div className="list">
      <div className="receipt">
        <div className="perf top" />
        <div className="receipt-body">
          <div className="receipt-head">
            <div className="mono tiny">CIERRE DE CUENTAS</div>
            <div className="display sm dark">Quién le paga a quién</div>
          </div>
          {transfers.length === 0 ? (
            <p className="dark-muted small">Nadie le debe nada a nadie. Todo cuadrado.</p>
          ) : (
            <div className="transfers">
              {transfers.map((t, i) => (
                <Leader
                  key={i}
                  strong
                  left={
                    <span className="tr">
                      <b>{nameOf(t.from)}</b> <span className="arrow">→</span> <b>{nameOf(t.to)}</b>
                    </span>
                  }
                  right={<span className="mono">{fmt(t.amount, cur)}</span>}
                />
              ))}
            </div>
          )}
          <div className="receipt-rule" />
          <div className="mono tiny dark-muted">
            {transfers.length} transferencia{transfers.length === 1 ? "" : "s"} · todo en {cur}
          </div>
        </div>
        <div className="perf bottom" />
      </div>

      <button className="btn ghost wide" onClick={copy}>
        Copiar resumen para el grupo
      </button>
      <p className="muted small foot">
        Se calcula el mínimo de transferencias: en vez de 21 pagos cruzados quedan solo los necesarios.
      </p>
      <div className="pad" />
    </div>
  );
}

/* ------------------------------------------------------------------ */
/* Vista: ajustes                                                      */
/* ------------------------------------------------------------------ */

function SettingsView({ data, persist, me, setMe, say, store }) {
  const [ars, setArs] = useState(String(data.rates.ARS));
  const [usd, setUsd] = useState(String(data.rates.USD));
  const [base, setBase] = useState(data.base);
  const [restore, setRestore] = useState("");

  const backup = JSON.stringify({ base: data.base, rates: data.rates, expenses: data.expenses });

  const copyBackup = async () => {
    try {
      await navigator.clipboard.writeText(backup);
      say("Respaldo copiado. Pégalo en el grupo o en una nota.");
    } catch {
      say("No se pudo copiar. Selecciona el texto y cópialo a mano.");
    }
  };

  const applyRestore = () => {
    try {
      const parsed = JSON.parse(restore);
      if (!Array.isArray(parsed.expenses)) throw new Error();
      persist({
        base: parsed.base || "CLP",
        rates: parsed.rates || DEFAULT_DATA.rates,
        ratesUpdatedAt: Date.now(),
        expenses: parsed.expenses,
      });
      setRestore("");
      say("Datos restaurados");
    } catch {
      say("Ese texto no es un respaldo válido");
    }
  };

  const apply = () => {
    const a = parseFloat(ars.replace(",", "."));
    const u = parseFloat(usd.replace(",", "."));
    if (!Number.isFinite(a) || !Number.isFinite(u) || a <= 0 || u <= 0) {
      say("Revisa los tipos de cambio: deben ser números mayores que cero");
      return;
    }
    persist({
      ...data,
      base,
      rates: { CLP: 1, ARS: a, USD: u },
      ratesUpdatedAt: Date.now(),
    });
    say("Tipos de cambio actualizados para todo el grupo");
  };

  return (
    <div className="list">
      <div className="section-label">Tipos de cambio del viaje</div>
      <div className="card">
        <p className="muted small">
          Se fijan una vez y se aplican a todos los gastos, pasados y futuros. Cámbialos cuando quieras: los
          saldos se recalculan solos.
        </p>
        <label className="field">
          <span>1 USD equivale a</span>
          <div className="input-row">
            <input className="input mono" inputMode="decimal" value={usd} onChange={(e) => setUsd(e.target.value)} />
            <span className="suffix mono">CLP</span>
          </div>
        </label>
        <label className="field">
          <span>1 ARS equivale a</span>
          <div className="input-row">
            <input className="input mono" inputMode="decimal" value={ars} onChange={(e) => setArs(e.target.value)} />
            <span className="suffix mono">CLP</span>
          </div>
        </label>
        <label className="field">
          <span>Moneda para saldar al final</span>
          <div className="seg">
            {CUR_LIST.map((c) => (
              <button key={c} className={"seg-btn" + (base === c ? " on" : "")} onClick={() => setBase(c)}>
                {c}
              </button>
            ))}
          </div>
        </label>
        <button className="btn wide" onClick={apply}>
          Guardar cambios
        </button>
      </div>

      <div className="section-label">Tu identidad</div>
      <div className="card">
        <p className="muted small">Estás usando la app como {nameOf(me)}.</p>
        <div className="chips">
          {MEMBERS.map((m) => (
            <button key={m.id} className={"chip" + (me === m.id ? " on" : "")} onClick={() => setMe(m.id)}>
              {m.name}
            </button>
          ))}
        </div>
      </div>

      <div className="section-label">Respaldo</div>
      <div className="card">
        <div className="status">
          <span className="dot" style={{ background: store.ok ? "var(--credit)" : "var(--debt)" }} />
          <span className="small">
            {store.ok ? "Guardando en este navegador" : "No se está guardando: " + (store.reason || "")}
          </span>
        </div>
        <p className="muted small">
          Copia este texto de vez en cuando y pégalo en el grupo. Con eso se puede recuperar todo si algo se
          pierde.
        </p>
        <button className="btn ghost wide" onClick={copyBackup}>
          Copiar respaldo ({(data.expenses || []).filter((e) => !e.deleted).length} gastos)
        </button>
        <label className="field">
          <span>Restaurar desde un respaldo</span>
          <textarea
            className="input mono tiny-area"
            rows={3}
            placeholder="Pega aquí el texto del respaldo"
            value={restore}
            onChange={(e) => setRestore(e.target.value)}
          />
        </label>
        <button className="btn ghost wide" onClick={applyRestore} disabled={!restore.trim()}>
          Reemplazar todo con este respaldo
        </button>
      </div>
      <div className="pad" />
    </div>
  );
}

/* Editor de gasto                                                     */
/* ------------------------------------------------------------------ */

function ExpenseEditor({ initial, me, defaultCurrency, onSave, onDelete, onClose, say }) {
  const [desc, setDesc] = useState(initial ? initial.desc : "");
  const [amount, setAmount] = useState(initial ? String(initial.amount) : "");
  const [currency, setCurrency] = useState(initial ? initial.currency : defaultCurrency);
  const [payer, setPayer] = useState(initial ? initial.payer : me);
  const [date, setDate] = useState(initial ? initial.date : todayISO());
  const [mode, setMode] = useState(initial ? initial.mode : "equal");
  const [participants, setParticipants] = useState(
    initial && initial.participants ? initial.participants : MEMBERS.map((m) => m.id)
  );
  const [shares, setShares] = useState(initial && initial.shares ? initial.shares : {});
  const [items, setItems] = useState(initial && initial.items ? initial.items : null);
  const [extras, setExtras] = useState(initial && initial.extras ? initial.extras : { tip: 0, tax: 0 });
  const [scanning, setScanning] = useState(false);
  const [scanError, setScanError] = useState(null);
  const [preview, setPreview] = useState(null);
  const [scanTotal, setScanTotal] = useState(0);
  const fileRef = useRef(null);
  const camRef = useRef(null);

  const dec = CUR[currency].dec;
  const amt = parseFloat(String(amount).replace(",", ".")) || 0;

  const toggleParticipant = (id) => {
    setParticipants((p) => (p.includes(id) ? p.filter((x) => x !== id) : [...p, id]));
  };

  /* ---- reparto por ítems ---- */
  const itemShares = useMemo(() => {
    if (!items) return {};
    const f = Math.pow(10, dec);
    const sub = {};
    MEMBERS.forEach((m) => (sub[m.id] = 0));
    items.forEach((it) => {
      const who = it.who && it.who.length ? it.who : participants;
      if (!who.length) return;
      const part = splitEqual(it.amount, who, currency);
      Object.entries(part).forEach(([id, v]) => (sub[id] += v));
    });
    const subTotal = Object.values(sub).reduce((s, v) => s + v, 0);
    const extraTotal = (Number(extras.tip) || 0) + (Number(extras.tax) || 0);
    const out = {};
    Object.entries(sub).forEach(([id, v]) => {
      if (v <= 0) return;
      const share = subTotal > 0 ? (v / subTotal) * extraTotal : 0;
      out[id] = Math.round((v + share) * f) / f;
    });
    return out;
  }, [items, extras, participants, currency, dec]);

  useEffect(() => {
    if (mode === "items" && items) {
      const t = items.reduce((s, it) => s + (Number(it.amount) || 0), 0) + (Number(extras.tip) || 0) + (Number(extras.tax) || 0);
      setAmount(String(Math.round(t * Math.pow(10, dec)) / Math.pow(10, dec)));
    }
  }, [items, extras, mode, dec]);

  const exactSum = useMemo(
    () => Object.values(shares).reduce((s, v) => s + (Number(v) || 0), 0),
    [shares]
  );

  const handleFile = async (file) => {
    if (!file) return;
    setScanError(null);
    setScanning(true);
    try {
      const { base64, preview: p } = await shrinkImage(file);
      setPreview(p);
      const r = await scanReceipt(base64);
      const parsed = (r.items || [])
        .filter((it) => Number(it.monto) > 0)
        .map((it) => ({ id: uid(), name: String(it.nombre || "Ítem"), amount: Number(it.monto), who: [] }));
      if (!parsed.length) throw new Error("No se detectaron ítems");
      if (r.moneda && CUR[r.moneda]) setCurrency(r.moneda);
      if (r.fecha && /^\d{4}-\d{2}-\d{2}$/.test(r.fecha)) setDate(r.fecha);
      if (r.comercio && !desc) setDesc(String(r.comercio));
      setExtras({ tip: Number(r.propina) || 0, tax: Number(r.impuesto) || 0 });
      setScanTotal(Number(r.total) || 0);
      setItems(parsed);
      setMode("items");
    } catch (err) {
      setScanError(
        "No se pudo leer la boleta: " + ((err && err.message) || "error desconocido") +
          ". Puedes cargar los ítems a mano."
      );
    } finally {
      setScanning(false);
    }
  };

  const save = () => {
    if (!amt || amt <= 0) return say("Falta el monto del gasto");
    if (!desc.trim()) return say("Ponle un nombre al gasto");
    let finalShares = null;
    if (mode === "equal") {
      if (!participants.length) return say("Elige al menos una persona que participa");
    } else if (mode === "exact") {
      const diff = Math.abs(exactSum - amt);
      if (diff > Math.pow(10, -dec) / 2) {
        return say(`Los montos suman ${fmt(exactSum, currency)} y el gasto es ${fmt(amt, currency)}`);
      }
      finalShares = Object.fromEntries(
        Object.entries(shares).filter(([, v]) => Number(v) > 0).map(([k, v]) => [k, Number(v)])
      );
    } else {
      if (!Object.keys(itemShares).length) return say("Asigna al menos un ítem");
      finalShares = itemShares;
    }
    onSave({
      id: initial ? initial.id : uid(),
      date,
      desc: desc.trim(),
      amount: amt,
      currency,
      payer,
      mode,
      participants,
      shares: finalShares,
      items: mode === "items" ? items : null,
      extras: mode === "items" ? extras : null,
      deleted: false,
    });
  };

  return (
    <Sheet open onClose={onClose} title={initial ? "Editar gasto" : "Nuevo gasto"}>
      <label className="field">
        <span>¿Qué fue?</span>
        <input
          className="input"
          placeholder="Cena en el Tenedor Libre"
          value={desc}
          onChange={(e) => setDesc(e.target.value)}
        />
      </label>

      <div className="two">
        <label className="field">
          <span>Monto</span>
          <input
            className="input mono big"
            inputMode="decimal"
            placeholder="0"
            value={amount}
            onChange={(e) => setAmount(e.target.value)}
            disabled={mode === "items" && !!items}
          />
        </label>
        <label className="field">
          <span>Moneda</span>
          <div className="seg">
            {CUR_LIST.map((c) => (
              <button key={c} className={"seg-btn" + (currency === c ? " on" : "")} onClick={() => setCurrency(c)}>
                {c}
              </button>
            ))}
          </div>
        </label>
      </div>

      <label className="field">
        <span>Fecha</span>
        <input className="input mono" type="date" value={date} onChange={(e) => setDate(e.target.value)} />
      </label>

      <label className="field">
        <span>¿Quién pagó?</span>
        <div className="chips">
          {MEMBERS.map((m) => (
            <button key={m.id} className={"chip" + (payer === m.id ? " on" : "")} onClick={() => setPayer(m.id)}>
              {m.name}
            </button>
          ))}
        </div>
      </label>

      <div className="field">
        <span>¿Cómo se divide?</span>
        <div className="seg tri">
          {[
            ["equal", "Partes iguales"],
            ["exact", "Montos"],
            ["items", "Por la boleta"],
          ].map(([k, l]) => (
            <button key={k} className={"seg-btn" + (mode === k ? " on" : "")} onClick={() => setMode(k)}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {mode === "equal" && (
        <div className="field">
          <span>Participan</span>
          <div className="chips">
            {MEMBERS.map((m) => (
              <button
                key={m.id}
                className={"chip" + (participants.includes(m.id) ? " on" : "")}
                onClick={() => toggleParticipant(m.id)}
              >
                {m.name}
              </button>
            ))}
          </div>
          {participants.length > 0 && amt > 0 && (
            <p className="muted small">
              {fmt(amt / participants.length, currency)} cada uno · {participants.length} personas
            </p>
          )}
        </div>
      )}

      {mode === "exact" && (
        <div className="field">
          <span>Cuánto le toca a cada uno</span>
          {MEMBERS.map((m) => (
            <div key={m.id} className="exact-row">
              <Avatar id={m.id} size={28} dim={!shares[m.id]} />
              <span className="exact-name">{m.name}</span>
              <input
                className="input mono small-input"
                inputMode="decimal"
                placeholder="0"
                value={shares[m.id] !== undefined ? shares[m.id] : ""}
                onChange={(e) => setShares({ ...shares, [m.id]: e.target.value })}
              />
            </div>
          ))}
          <div className={"sum-check" + (Math.abs(exactSum - amt) < 0.005 ? " ok" : "")}>
            <span>suma</span>
            <span className="mono">
              {fmt(exactSum, currency)} de {fmt(amt, currency)}
            </span>
          </div>
        </div>
      )}

      {mode === "items" && (
        <div className="field">
          {!items && (
            <div className="scan-box">
              <div className="scan-mark">▤</div>
              <p className="muted small">
                Saca una foto de la cuenta y se leen los ítems solos. Después tocas quién consumió cada uno.
              </p>
              <div className="two">
                <button className="btn" onClick={() => camRef.current && camRef.current.click()} disabled={scanning}>
                  {scanning ? "Leyendo…" : "Tomar foto"}
                </button>
                <button
                  className="btn ghost"
                  onClick={() => fileRef.current && fileRef.current.click()}
                  disabled={scanning}
                >
                  Subir imagen
                </button>
              </div>
              <button
                className="link"
                onClick={() => setItems([{ id: uid(), name: "", amount: 0, who: [] }])}
              >
                o escribir los ítems a mano
              </button>
              {scanError && <p className="error small">{scanError}</p>}
            </div>
          )}

          <input
            ref={camRef}
            type="file"
            accept="image/*"
            capture="environment"
            className="hidden"
            onChange={(e) => handleFile(e.target.files && e.target.files[0])}
          />
          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            className="hidden"
            onChange={(e) => handleFile(e.target.files && e.target.files[0])}
          />

          {items && (
            <div className="items">
              {preview && <img src={preview} alt="Boleta" className="thumb" />}
              {scanTotal > 0 && Math.abs(scanTotal - amt) > Math.pow(10, -dec) && (
                <p className="error small">
                  Ojo: la boleta dice {fmt(scanTotal, currency)} y lo leído suma {fmt(amt, currency)}. Falta o
                  sobra algún ítem — revísalos antes de guardar.
                </p>
              )}
              <p className="muted tiny">
                Revisa los montos antes de guardar: la lectura automática se equivoca de vez en cuando. Un ítem sin
                nadie marcado se reparte entre todos.
              </p>
              {items.map((it, idx) => (
                <div key={it.id} className="item">
                  <div className="item-head">
                    <input
                      className="input flat"
                      placeholder="Ítem"
                      value={it.name}
                      onChange={(e) => {
                        const c = items.slice();
                        c[idx] = { ...it, name: e.target.value };
                        setItems(c);
                      }}
                    />
                    <input
                      className="input mono small-input"
                      inputMode="decimal"
                      value={it.amount}
                      onChange={(e) => {
                        const c = items.slice();
                        c[idx] = { ...it, amount: parseFloat(String(e.target.value).replace(",", ".")) || 0 };
                        setItems(c);
                      }}
                    />
                    <button
                      className="icon-btn sm"
                      onClick={() => setItems(items.filter((x) => x.id !== it.id))}
                      aria-label="Quitar ítem"
                    >
                      ✕
                    </button>
                  </div>
                  <div className="who">
                    {MEMBERS.map((m) => {
                      const on = it.who.includes(m.id);
                      return (
                        <button
                          key={m.id}
                          className={"who-btn" + (on ? " on" : "")}
                          style={on ? { background: m.tint, color: "#0E1512" } : undefined}
                          onClick={() => {
                            const c = items.slice();
                            c[idx] = {
                              ...it,
                              who: on ? it.who.filter((x) => x !== m.id) : [...it.who, m.id],
                            };
                            setItems(c);
                          }}
                        >
                          {m.name}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
              <button
                className="link"
                onClick={() => setItems([...items, { id: uid(), name: "", amount: 0, who: [] }])}
              >
                + agregar ítem
              </button>

              <div className="two">
                <label className="field">
                  <span>Propina</span>
                  <input
                    className="input mono"
                    inputMode="decimal"
                    value={extras.tip}
                    onChange={(e) => setExtras({ ...extras, tip: parseFloat(String(e.target.value).replace(",", ".")) || 0 })}
                  />
                </label>
                <label className="field">
                  <span>Impuesto</span>
                  <input
                    className="input mono"
                    inputMode="decimal"
                    value={extras.tax}
                    onChange={(e) => setExtras({ ...extras, tax: parseFloat(String(e.target.value).replace(",", ".")) || 0 })}
                  />
                </label>
              </div>

              <div className="preview-shares">
                <div className="mono tiny muted">CÓMO QUEDA</div>
                {Object.entries(itemShares).map(([id, v]) => (
                  <Leader key={id} left={nameOf(id)} right={<span className="mono">{fmt(v, currency)}</span>} />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      <div className="actions">
        <button className="btn wide" onClick={save}>
          {initial ? "Guardar cambios" : "Agregar gasto"}
        </button>
        {initial && (
          <button className="btn danger wide" onClick={() => onDelete(initial.id)}>
            Eliminar gasto
          </button>
        )}
      </div>
      <div className="pad" />
    </Sheet>
  );
}

  padding:18px 18px 14px;border-bottom:1px solid var(--line);
}
.total{font-size:30px;font-weight:600;letter-spacing:-.02em;margin:2px 0 3px}
.icon-btn{
  background:var(--surface);border:1px solid var(--line);color:var(--text);
  width:38px;height:38px;border-radius:11px;font-size:16px;cursor:pointer;flex:none;
}
.icon-btn.sm{width:30px;height:30px;font-size:12px}
.spin{display:inline-block;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.list{padding:14px 14px 0;display:flex;flex-direction:column;gap:12px}
.section-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:6px 4px 0}

/* filas de gasto */
.day{display:flex;flex-direction:column;gap:6px}
.day-head{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 4px 2px;color:var(--muted)}
.row{
  display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:12px;color:var(--text);cursor:pointer;font-family:inherit;font-size:15px;
}
.row:active{background:var(--surface2)}
.row-mid{flex:1;min-width:0}
.row-title{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-amt{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.row-amt .mono{font-weight:600}

.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;letter-spacing:.02em;flex:none}

/* tarjetas de personas */
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:12px}
.card.mine{border-color:var(--sun)}
.card-head{display:flex;align-items:center;gap:10px}
.card-name{flex:1;font-weight:500}
.net{font-weight:600;font-size:15px}
.bars{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);width:38px;flex:none}
.bar-track{flex:1;height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-fill.paid{background:var(--sun)}
.bar-fill.owed{background:#48605A}
.bar-row .mono{width:88px;text-align:right;flex:none;color:var(--muted)}

/* recibo */
.receipt{position:relative;background:var(--paper);color:#1A1A17;border-radius:3px;margin:4px 2px}
.receipt-body{padding:20px 18px}
.receipt-head{margin-bottom:14px}
.receipt-head .mono{color:#7A7466;letter-spacing:.18em}
.receipt-rule{border-top:1px dashed var(--paper-line);margin:14px 0 10px}
.dark-muted{color:#6E6859}
.perf{height:10px;background:
  radial-gradient(circle at 6px 0, transparent 0 5px, var(--paper) 5px) repeat-x;
  background-size:12px 10px;
}
.perf.top{transform:rotate(180deg)}
.transfers{display:flex;flex-direction:column;gap:11px}
.leader{display:flex;align-items:baseline;gap:6px;font-size:14px}
.leader-l{flex:none}
.leader-dots{flex:1;border-bottom:1px dotted var(--paper-line);transform:translateY(-3px)}
.leader-r{flex:none;font-weight:600}
.leader.strong{font-size:15px}
.arrow{color:#9A9484;padding:0 2px}
.tr b{font-weight:600}

/* botones */
.btn{
  background:var(--sun);color:#0E1512;border:none;border-radius:12px;
  padding:13px 16px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;
}
.btn:disabled{opacity:.5}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.btn.danger{background:transparent;color:var(--debt);border:1px solid var(--line)}
.btn.wide{width:100%}
.link{background:none;border:none;color:var(--sun);font-family:inherit;font-size:13px;text-decoration:underline;cursor:pointer;padding:8px 0;align-self:flex-start}

.fab{
  position:absolute;right:18px;bottom:82px;width:56px;height:56px;border-radius:18px;
  background:var(--sun);color:#0E1512;border:none;font-size:28px;font-weight:400;cursor:pointer;
  box-shadow:0 8px 24px rgba(0,0,0,.45);z-index:5;
}

/* tabs */
.tabs{display:flex;border-top:1px solid var(--line);background:var(--ink);padding-bottom:env(safe-area-inset-bottom)}
.tab{
  flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:12px;
  padding:14px 4px 16px;cursor:pointer;border-top:2px solid transparent;margin-top:-1px;
}
.tab.on{color:var(--text);border-top-color:var(--sun)}

/* hoja modal */
.sheet-wrap{position:absolute;inset:0;background:rgba(6,10,9,.72);z-index:20;display:flex;align-items:flex-end}
.sheet{
  background:var(--ink);border-top:1px solid var(--line);border-radius:20px 20px 0 0;
  width:100%;max-height:94%;display:flex;flex-direction:column;
  animation:up .22s ease-out;
}
@keyframes up{from{transform:translateY(24px);opacity:.4}to{transform:none;opacity:1}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 10px;border-bottom:1px solid var(--line)}
.sheet-title{font-weight:600}
.sheet-body{overflow-y:auto;padding:14px 16px 0;display:flex;flex-direction:column;gap:14px}

/* campos */
.field{display:flex;flex-direction:column;gap:7px}
.field>span{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.input{
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:12px;color:var(--text);font-family:inherit;font-size:16px;width:100%;
}
.input:focus{outline:2px solid var(--sun);outline-offset:-1px}
.input.big{font-size:22px;font-weight:600}
.input.flat{background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:8px 2px}
.input.small-input{width:96px;flex:none;text-align:right}
.input-row{display:flex;align-items:center;gap:8px}
.suffix{color:var(--muted);font-size:13px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.seg-btn{
  flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:13px;
  padding:9px 4px;border-radius:8px;cursor:pointer;
}
.seg-btn.on{background:var(--surface2);color:var(--text);font-weight:600}
.seg.tri .seg-btn{font-size:12px}

.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:8px 13px;font-family:inherit;font-size:13px;cursor:pointer;
}
.chip.on{background:var(--sun);border-color:var(--sun);color:#0E1512;font-weight:600}

.exact-row{display:flex;align-items:center;gap:10px}
.exact-name{flex:1;font-size:14px}
.sum-check{display:flex;justify-content:space-between;padding:9px 2px 0;font-size:12px;color:var(--debt);text-transform:uppercase;letter-spacing:.1em}
.sum-check.ok{color:var(--credit)}

/* escaneo */
.scan-box{
  border:1px dashed var(--line);border-radius:14px;padding:18px;
  display:flex;flex-direction:column;gap:12px;align-items:stretch;text-align:center;
}
.scan-mark{font-size:26px;color:var(--sun)}
.thumb{width:100%;max-height:150px;object-fit:cover;border-radius:11px;border:1px solid var(--line)}
.items{display:flex;flex-direction:column;gap:14px}
.item{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:11px;display:flex;flex-direction:column;gap:9px}
.item-head{display:flex;align-items:center;gap:8px}
.who{display:flex;flex-wrap:wrap;gap:6px}
.who-btn{
  background:var(--surface2);border:1px solid var(--line);color:var(--muted);
  border-radius:8px;padding:6px 9px;font-family:inherit;font-size:12px;cursor:pointer;
}
.who-btn.on{border-color:transparent;font-weight:600}
.preview-shares{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px;display:flex;flex-direction:column;gap:8px}
.preview-shares .leader-dots{border-bottom-color:var(--line)}
.preview-shares .leader-r{color:var(--text)}

.actions{display:flex;flex-direction:column;gap:9px;padding-top:4px}

/* onboarding */
.onboard{padding:34px 22px;display:flex;flex-direction:column;gap:6px}
.grid-people{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.person-pick{
  display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:12px;color:var(--text);font-family:inherit;font-size:15px;cursor:pointer;
}
.person-pick:active{background:var(--surface2)}

/* vacío */
.empty{padding:60px 30px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.empty-mark{font-size:30px;color:var(--sun);margin-bottom:6px}

/* alarma de guardado */
.alarm{
  background:var(--debt);color:#12100F;padding:11px 16px;font-size:13px;line-height:1.4;
}
.alarm b{font-weight:700}
.status{display:flex;align-items:center;gap:9px}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.tiny-area{font-size:12px;resize:vertical;line-height:1.4}

/* toast */
.toast{
  position:absolute;left:16px;right:16px;bottom:92px;z-index:30;
  background:var(--paper);color:#1A1A17;border-radius:11px;padding:12px 14px;font-size:13px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important}
}
`}</style>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
